[package]
name = "nova-doc-editor"
version = "0.1.0"
description = "NOVARA Doc Editor — Cloud-ready PDF & Document Editor"
authors = ["Mwesigwa Perez"]
edition = "2021"

[lib]
name = "nova_doc_editor_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-dialog = "2"
tauri-plugin-fs = "2"
tauri-plugin-clipboard-manager = "2"
tauri-plugin-updater = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[profile.release]
strip = true
lto = true
codegen-units = 1
panic = "abort"
opt-level = "s"
